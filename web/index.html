<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bharat Doc Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div class="max-w-5xl mx-auto px-4 py-8">
    <header class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold">Bharat Doc Intelligence</h1>
        <p class="text-slate-500 text-sm">
          Multimodal GST-document understanding for Indian SMBs ·
          OpenAI Agents SDK + Responses API
        </p>
      </div>
      <span id="mode-badge" class="text-xs px-2 py-1 rounded-full bg-slate-200 text-slate-600">…</span>
    </header>

    <div class="grid md:grid-cols-2 gap-6">
      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h2 class="font-semibold mb-3">1 · Provide a document</h2>
        <label class="block text-sm text-slate-600 mb-1">Invoice / receipt image</label>
        <input id="file" type="file" accept="image/*"
               class="block w-full text-sm mb-4 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-slate-800 file:text-white" />
        <label class="block text-sm text-slate-600 mb-1">…or paste text / a hint</label>
        <textarea id="text" rows="4" placeholder="Paste OCR text, or type 'dirty' to see anomaly detection in mock mode"
                  class="w-full border border-slate-300 rounded-lg p-2 text-sm mono"></textarea>
        <button id="run"
                class="mt-4 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 rounded-lg">
          Analyze document
        </button>
        <p id="status" class="text-xs text-slate-400 mt-2"></p>
      </section>

      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-semibold">2 · Report</h2>
          <span id="confidence" class="text-sm font-semibold"></span>
        </div>
        <div id="anomalies" class="space-y-2 mb-4"></div>
        <pre id="json" class="bg-slate-900 text-slate-100 text-xs rounded-lg p-3 overflow-auto mono" style="max-height:340px"></pre>
      </section>
    </div>
    <footer class="text-center text-xs text-slate-400 mt-8">
      Runs in <span class="mono">mock</span> mode with no API key, or <span class="mono">live</span> mode with OPENAI_API_KEY.
    </footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    async function loadHealth() {
      try {
        const r = await fetch("/api/health");
        const h = await r.json();
        const badge = $("mode-badge");
        badge.textContent = h.mode + " · " + h.model;
        badge.className = "text-xs px-2 py-1 rounded-full " +
          (h.mode === "live" ? "bg-emerald-100 text-emerald-700" : "bg-amber-100 text-amber-700");
      } catch (e) { /* ignore */ }
    }

    function sevColor(s) {
      return s === "error" ? "bg-red-50 text-red-700 border-red-200"
           : s === "warning" ? "bg-amber-50 text-amber-700 border-amber-200"
           : "bg-sky-50 text-sky-700 border-sky-200";
    }

    function render(report) {
      $("confidence").textContent = "confidence " + (report.confidence * 100).toFixed(0) + "%";
      $("confidence").className = "text-sm font-semibold " +
        (report.confidence > 0.8 ? "text-emerald-600" : report.confidence > 0.5 ? "text-amber-600" : "text-red-600");

      const box = $("anomalies");
      box.innerHTML = "";
      if (!report.anomalies.length) {
        box.innerHTML = '<div class="border rounded-lg p-2 text-sm bg-emerald-50 text-emerald-700 border-emerald-200">No anomalies detected ✓</div>';
      }
      for (const a of report.anomalies) {
        const el = document.createElement("div");
        el.className = "border rounded-lg p-2 text-sm " + sevColor(a.severity);
        el.innerHTML = `<span class="font-semibold uppercase text-[10px]">${a.severity}</span> · ${a.message}`;
        box.appendChild(el);
      }
      $("json").textContent = JSON.stringify(report.extracted, null, 2);
    }

    $("run").addEventListener("click", async () => {
      $("status").textContent = "Analyzing…";
      $("run").disabled = true;
      try {
        const fd = new FormData();
        const f = $("file").files[0];
        if (f) fd.append("file", f);
        if ($("text").value) fd.append("text", $("text").value);
        const r = await fetch("/api/analyze", { method: "POST", body: fd });
        if (!r.ok) throw new Error("HTTP " + r.status);
        render(await r.json());
        $("status").textContent = "Done.";
      } catch (e) {
        $("status").textContent = "Error: " + e.message;
      } finally {
        $("run").disabled = false;
      }
    });

    loadHealth();
  </script>
</body>
</html>

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      USE_MOCK: "1"          # run everything offline, no API key required
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q
      - name: Run evals (regression gate)
        run: python -m evals.run_evals --write
